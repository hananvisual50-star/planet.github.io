<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>PLANET PRODUCTION</title> 

  <link rel="manifest" href="manifest.json">
  
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">

  <style>
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Menghilangkan scrollbar utama */
      background-color: #0d1117; /* Warna latar belakang gelap khas tema Planet */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 100%;
      height: 100%;
    }
    
    /* Container utama agar iframe memenuhi layar secara responsif */
    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Indikator Loading saat Web App Google Script sedang dimuat */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #0d1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
      pointer-events: none; /* Supaya tidak menghalangi interaksi setelah memudar */
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #38bdf8; /* Warna aksen biru langit planet */
      animation: spin 1s ease-in-out infinite;
    }

    .loading-text {
      color: #94a3b8;
      margin-top: 20px;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .fade-out {
      opacity: 0;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="loading" class="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Menghubungkan ke Planet Production...</div>
    </div>

    <iframe 
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycbwZjbuN6uG8mO9BeSqvkF8lyjT-dKgTMHrWVgunjLAqR5eBdYWUAWxWS0yuFl6XXjmRKg/exec" 
      allow="geolocation"
      onload="hideLoading()">
    </iframe>
  </div>

  <script>
    // Fungsi untuk menyembunyikan indikator loading saat iframe selesai dimuat
    function hideLoading() {
      const loader = document.getElementById('loading');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(() => {
          loader.remove();
        }, 500);
      }
    }

    // Mendaftarkan Service Worker agar memenuhi kriteria instalasi PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('PWA ServiceWorker berhasil didaftarkan dengan scope: ', registration.scope);
          })
          .catch(error => {
            console.error('PWA ServiceWorker gagal didaftarkan: ', error);
          });
      });
    }
  </script>
</body>
</html>
