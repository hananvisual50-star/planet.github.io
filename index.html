<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#059669">
  
  <title>PLANET PRODUCUTION</title> 

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* Biar ga ada scrollbar */
      background-color: #0d1117; /* Warna background gelap biar pas loading ga silau */
    }
    iframe {
      border: none;
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbwZjbuN6uG8mO9BeSqvkF8lyjT-dKgTMHrWVgunjLAqR5eBdYWUAWxWS0yuFl6XXjmRKg/exec"></iframe>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker terdaftar!', reg))
          .catch(err => console.log('Gagal mendaftar Service Worker', err));
      });
    }
  </script>

</body>
</html>
